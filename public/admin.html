<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — PassportX</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--dark-2);">

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon" style="background: var(--warning);">⚡</div>
        <span class="sidebar-logo-text" style="background: var(--warning); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;">Officer Panel</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Management</div>
        <a href="admin.html" class="sidebar-link active">📋 Applications</a>
      </nav>
      <div style="margin-top: auto;">
        <button class="btn btn-danger" style="width: 100%;" onclick="logout()">Logout</button>
      </div>
    </aside>

    <main class="dashboard-main" style="flex: 1; padding: 32px; margin-left: 260px;">
      <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 32px;">
        <h2 style="font-family:'Outfit', sans-serif;">Verification Queue</h2>
        <div class="user-profile" style="display:flex; align-items:center; gap:12px;">
          <div style="text-align:right;">
            <div style="font-size:14px; font-weight:600;" id="user-name">Admin User</div>
            <div style="font-size:12px; color:var(--text-muted);">Admin</div>
          </div>
          <div style="width:40px; height:40px; border-radius:50%; background:var(--warning); display:flex; align-items:center; justify-content:center; color: var(--dark); font-weight:bold;">A</div>
        </div>
      </header>

      <div class="glass-card" style="padding: 24px; margin-bottom: 24px;">
        <h3 style="margin-bottom: 16px;">Pending Applications</h3>
        <table style="width: 100%; border-collapse: collapse; font-size: 14px; text-align: left;">
          <thead>
            <tr style="border-bottom: 1px solid var(--glass-border); color: var(--text-muted);">
              <th style="padding: 12px 8px;">App ID</th>
              <th style="padding: 12px 8px;">Applicant</th>
              <th style="padding: 12px 8px;">Email</th>
              <th style="padding: 12px 8px;">Status</th>
              <th style="padding: 12px 8px;">Document</th>
              <th style="padding: 12px 8px; text-align: right;">Action</th>
            </tr>
          </thead>
          <tbody id="admin-apps-list">
            <tr><td colspan="6" style="padding: 16px; text-align:center;">Loading...</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));
    
    if (!token || user.role !== 'admin') {
      window.location.href = 'auth.html';
    }

    document.getElementById('user-name').innerText = user.name;

    function logout() {
      localStorage.clear();
      window.location.href = 'auth.html';
    }

    async function loadAdminApplications() {
      try {
        const res = await fetch('/api/admin/applications', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const apps = await res.json();
        const tbody = document.getElementById('admin-apps-list');
        tbody.innerHTML = '';

        if (!Array.isArray(apps) || apps.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="padding: 16px; text-align:center;">No pending applications.</td></tr>';
          return;
        }

        apps.forEach(app => {
          tbody.innerHTML += `
            <tr style="border-bottom: 1px solid var(--glass-border);">
              <td style="padding: 16px 8px;">#${app.id}</td>
              <td style="padding: 16px 8px;">${app.first_name} ${app.last_name}</td>
              <td style="padding: 16px 8px;">${app.user_email}</td>
              <td style="padding: 16px 8px;">
                <span class="badge badge-${app.status?.toLowerCase() || 'pending'}">${app.status || 'Pending'}</span>
              </td>
              <td style="padding: 16px 8px;">
                <a href="${app.document_url}" target="_blank" class="btn btn-secondary btn-sm" style="font-size:12px;">View Doc</a>
              </td>
              <td style="padding: 16px 8px; text-align: right; display:flex; gap:8px; justify-content:flex-end;">
                <button class="btn btn-success btn-sm" onclick="updateStatus(${app.id}, 'Approved')">Approve</button>
                <button class="btn btn-danger btn-sm" onclick="updateStatus(${app.id}, 'Rejected')">Reject</button>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        console.error(err);
      }
    }

    async function updateStatus(id, status) {
      if (!confirm(`Are you sure you want to change status to ${status}?`)) return;

      try {
        const res = await fetch(`/api/admin/applications/${id}/status`, {
          method: 'PUT',
          headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ status, remarks: `Processed by Admin on ${new Date().toLocaleDateString()}` })
        });
        
        if (res.ok) {
          alert(`Status updated to ${status}`);
          loadAdminApplications();
        } else {
          alert('Failed to update status');
        }
      } catch (err) {
        alert('Server error');
      }
    }

    loadAdminApplications();
  </script>
</body>
</html>
