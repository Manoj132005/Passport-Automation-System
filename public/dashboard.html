<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — PassportX</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: var(--dark-2);">

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🛂</div>
        <span class="sidebar-logo-text">PassportX</span>
      </div>
      <nav class="sidebar-nav">
        <div class="sidebar-section-label">Main Menu</div>
        <a href="dashboard.html" class="sidebar-link active">🏠 Overview</a>
        <a href="#apply" class="sidebar-link" onclick="showSection('apply')">📝 New Application</a>
        <a href="#appointments" class="sidebar-link" onclick="showSection('appointments')">📅 Appointments</a>
      </nav>
      <div style="margin-top: auto;">
        <button class="btn btn-danger" style="width: 100%;" onclick="logout()">Logout</button>
      </div>
    </aside>

    <main class="dashboard-main" style="flex: 1; padding: 32px; margin-left: 260px;">
      <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 32px;">
        <h2 style="font-family:'Outfit', sans-serif;" id="welcome-text">Welcome back</h2>
        <div class="user-profile" style="display:flex; align-items:center; gap:12px;">
          <div style="text-align:right;">
            <div style="font-size:14px; font-weight:600;" id="user-name">User</div>
            <div style="font-size:12px; color:var(--text-muted);" id="user-role">Applicant</div>
          </div>
          <div style="width:40px; height:40px; border-radius:50%; background:var(--gradient-primary); display:flex; align-items:center; justify-content:center; font-weight:bold;">U</div>
        </div>
      </header>

      <!-- Sections -->
      <div id="section-overview">
        <div class="glass-card" style="padding: 24px; margin-bottom: 24px;">
          <h3>Your Applications</h3>
          <p style="color:var(--text-muted); font-size:14px; margin-bottom: 16px;">Track the status of your recent applications</p>
          <div id="applications-list" style="display:flex; flex-direction:column; gap:12px;">
            Loading applications...
          </div>
        </div>
      </div>

      <div id="section-apply" style="display: none;">
        <div class="glass-card" style="padding: 24px;">
          <h3 style="margin-bottom: 16px;">New Passport Application</h3>
          <form id="apply-form" style="display: flex; flex-direction: column; gap: 16px;">
             <div class="form-row">
               <div class="form-group">
                 <label class="form-label">First Name</label>
                 <input type="text" id="app-firstname" class="form-control" required>
               </div>
               <div class="form-group">
                 <label class="form-label">Last Name</label>
                 <input type="text" id="app-lastname" class="form-control" required>
               </div>
             </div>
             <div class="form-group">
               <label class="form-label">Date of Birth</label>
               <input type="date" id="app-dob" class="form-control" required>
             </div>
             <div class="form-group">
               <label class="form-label">Address</label>
               <textarea id="app-address" class="form-control" rows="3" required></textarea>
             </div>
             <div class="form-group">
               <label class="form-label">Upload Identity Document (PDF/Image)</label>
               <input type="file" id="app-doc" class="form-control" accept=".pdf,image/*" required>
             </div>
             <button type="submit" class="btn btn-primary" style="align-self: flex-start;">Submit Application</button>
          </form>
        </div>
      </div>

      <div id="section-appointments" style="display: none;">
        <div class="glass-card" style="padding: 24px;">
          <h3 style="margin-bottom: 16px;">Book Appointment</h3>
          <form id="appointment-form" style="display: flex; flex-direction: column; gap: 16px;">
             <div class="form-group">
               <label class="form-label">Select Application</label>
               <select id="apt-app-id" class="form-control" required></select>
             </div>
             <div class="form-row">
               <div class="form-group">
                 <label class="form-label">Date</label>
                 <input type="date" id="apt-date" class="form-control" required>
               </div>
               <div class="form-group">
                 <label class="form-label">Time Slot</label>
                 <select id="apt-time" class="form-control" required>
                   <option value="09:00 AM">09:00 AM</option>
                   <option value="11:00 AM">11:00 AM</option>
                   <option value="02:00 PM">02:00 PM</option>
                 </select>
               </div>
             </div>
             <button type="submit" class="btn btn-primary" style="align-self: flex-start;">Schedule Visit</button>
          </form>
        </div>
      </div>

    </main>
  </div>

  <div id="toast-container"></div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user'));
    
    if (!token || !user) {
      window.location.href = 'auth.html';
    } else {
      document.getElementById('welcome-text').innerText = `Welcome back, ${user.name.split(' ')[0]}`;
      document.getElementById('user-name').innerText = user.name;
      document.getElementById('user-role').innerText = user.role;
    }

    function showSection(section) {
      document.getElementById('section-overview').style.display = 'none';
      document.getElementById('section-apply').style.display = 'none';
      document.getElementById('section-appointments').style.display = 'none';
      document.getElementById(`section-${section}`).style.display = 'block';
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'auth.html';
    }

    // Load Applications
    async function loadApplications() {
      try {
        const res = await fetch('/api/applications/my', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const apps = await res.json();
        
        const list = document.getElementById('applications-list');
        const select = document.getElementById('apt-app-id');
        list.innerHTML = '';
        select.innerHTML = '<option value="">Choose application...</option>';

        if (apps.length === 0) {
          list.innerHTML = '<p style="color:var(--text-muted)">No applications submitted yet.</p>';
        } else {
          apps.forEach(app => {
            // Render list
            list.innerHTML += `
              <div style="border:1px solid var(--glass-border); padding: 16px; border-radius: var(--radius-md); background: rgba(255,255,255,0.02); display:flex; justify-content:space-between; align-items:center;">
                <div>
                  <div style="font-weight:600; font-size:15px;">App #${app.id}: ${app.first_name} ${app.last_name}</div>
                  <div style="font-size:13px; color:var(--text-muted); margin-top:4px;">Submitted: ${new Date(app.created_at).toLocaleDateString()}</div>
                </div>
                <div class="badge badge-${app.status.toLowerCase() || 'pending'}">${app.status || 'Pending'}</div>
              </div>
            `;
            // Add to dropdown
            select.innerHTML += `<option value="${app.id}">App #${app.id} - ${app.first_name} ${app.last_name}</option>`;
          });
        }
      } catch (err) {
        console.error(err);
      }
    }

    // Submit Application
    document.getElementById('apply-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData();
      formData.append('firstName', document.getElementById('app-firstname').value);
      formData.append('lastName', document.getElementById('app-lastname').value);
      formData.append('dob', document.getElementById('app-dob').value);
      formData.append('address', document.getElementById('app-address').value);
      formData.append('document', document.getElementById('app-doc').files[0]);

      try {
        const res = await fetch('/api/applications', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` },
          body: formData
        });
        if (res.ok) {
          alert('Application submitted successfully!');
          document.getElementById('apply-form').reset();
          loadApplications();
          showSection('overview');
        } else {
          alert('Failed to submit application');
        }
      } catch (err) {
        alert('Error submitting application');
      }
    });

    // Schedule Appointment
    document.getElementById('appointment-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const payload = {
        applicationId: document.getElementById('apt-app-id').value,
        appointmentDate: document.getElementById('apt-date').value,
        appointmentTime: document.getElementById('apt-time').value
      };

      try {
        const res = await fetch('/api/appointments', {
          method: 'POST',
          headers: { 
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        if (res.ok) {
          alert('Appointment scheduled successfully!');
          document.getElementById('appointment-form').reset();
          showSection('overview');
        } else {
          alert('Failed to schedule appointment');
        }
      } catch (err) {
        alert('Error scheduling appointment');
      }
    });

    loadApplications();
  </script>
</body>
</html>
